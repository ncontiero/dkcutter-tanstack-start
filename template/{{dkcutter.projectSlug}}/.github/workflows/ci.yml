name: CI

on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: {% raw %}${{ github.head_ref || github.run_id }}{% endraw %}
  cancel-in-progress: true

jobs:
  lint-styles:
    name: Lint Styles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
{% if dkcutter.pkgManager == "bun" %}
      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
{% else -%}
{% if dkcutter.pkgManager == "pnpm" %}
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
{% endif %}
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
{% endif %}
      - name: Install dependencies
        run: {{ dkcutter._ciInstall }}

      - name: Check Code
        run: {{ dkcutter.pkgManager }} run check
{% if dkcutter.useCommitlint %}
  lint-commits:
    name: Lint Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
{% if dkcutter.pkgManager == "bun" %}
      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
{% else -%}
{% if dkcutter.pkgManager == "pnpm" %}
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
{% endif %}
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
{% endif %}
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: |
{%- if dkcutter.pkgManager == "npm" %}
          npx commitlint /
{%- elif dkcutter.pkgManager == "bun" %}
          bunx commitlint /
{%- else %}
          {{ dkcutter.pkgManager }} dlx commitlint /
{%- endif %}
          --from {% raw %}${{ github.event.pull_request.base.sha }}{% endraw %} /
          --to {% raw %}${{ github.event.pull_request.head.sha }}{% endraw %} /
          --verbose
{% endif -%}
