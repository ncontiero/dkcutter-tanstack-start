name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: {% raw %}${{ github.head_ref || github.run_id }}{% endraw %}
  cancel-in-progress: true

jobs:
  check-code:
    name: Check Code/Commit - CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
{% if dkcutter.pkgManager == "bun" %}
      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
{% else -%}
{% if dkcutter.pkgManager == "pnpm" %}
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
{% endif %}
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
{% endif %}
      - name: Install dependencies
        run: {{ dkcutter._ciInstall }}

      - name: Check Code
        run: {{ dkcutter.pkgManager }} run check
{% if dkcutter.useCommitlint %}
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: |
          {{ 'npx' if dkcutter.pkgManager == 'npm' else dkcutter.pkgManager }} commitlint /
          --from {% raw %}${{ github.event.pull_request.base.sha }}{% endraw %} /
          --to {% raw %}${{ github.event.pull_request.head.sha }}{% endraw %} /
          --verbose
{% endif %}